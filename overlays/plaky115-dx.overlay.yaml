openapi: 3.1.0
overlay: 1.0.0
info:
  title: Plaky115 DX Metadata
  version: 0.2.0
actions:
  - target: $.info
    update:
      title: Plaky115 Public API
      description: |
        Unofficial Plaky115 toolkit metadata for generated SDK, CLI, and MCP
        artifacts. This overlay keeps the upstream API contract intact while
        adding operation names, summaries, examples, pagination hints, and MCP
        annotations for agent-safe clients.

  - target: $.paths["/v1/public/spaces"].get
    update:
      operationId: listSpaces
      summary: List workspace spaces
      description: List Plaky spaces visible to the API key, optionally embedding boards.
      x-plaky115-usage-example:
        title: List spaces
        description: Discover spaces before resolving boards or items.
        position: 1
      x-plaky115-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-plaky115-mcp:
        name: plaky_list_spaces
        title: List spaces
        description: List Plaky spaces visible to the API key, optionally embedding boards.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}"].get
    update:
      operationId: getSpace
      summary: Retrieve a space
      description: Retrieve one Plaky space by ID.
      x-plaky115-usage-example:
        title: Get a space
        description: Fetch one space after choosing its ID from listSpaces.
        position: 2
      x-plaky115-mcp:
        name: plaky_get_space
        title: Get space
        description: Retrieve one Plaky space by ID.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards"].get
    update:
      operationId: listBoards
      summary: List space boards
      description: List boards in a Plaky space.
      x-plaky115-usage-example:
        title: List boards
        description: Discover boards in a space before reading or mutating items.
        position: 3
      x-plaky115-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-plaky115-mcp:
        name: plaky_list_boards
        title: List boards
        description: List boards in a Plaky space.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}"].get
    update:
      operationId: getBoard
      summary: Retrieve a board
      description: Retrieve one Plaky board by space ID and board ID.
      x-plaky115-usage-example:
        title: Get a board
        description: Fetch board schema and groups before building item field values.
        position: 4
      x-plaky115-mcp:
        name: plaky_get_board
        title: Get board
        description: Retrieve one Plaky board by space ID and board ID.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items"].get
    update:
      operationId: listItems
      summary: List board items
      description: List items on a Plaky board with optional view, parent, and expansion filters.
      x-plaky115-usage-example:
        title: List board items
        description: Read board items with fields when preparing searches or exports.
        position: 5
      x-plaky115-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-plaky115-mcp:
        name: plaky_list_items
        title: List board items
        description: List items on a Plaky board with optional view, parent, and expansion filters.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items"].post
    update:
      operationId: createItem
      summary: Create an item
      description: Create a Plaky item using a title, group, parent, and optional field values.
      x-plaky115-usage-example:
        title: Create an item
        description: Create one item after resolving the target space, board, and group.
        position: 6
        request:
          title: Example item
          fields: []
        response:
          id: 123456
          title: Example item
          board: 222
          space: 111
          group: 333
          parent: null
          createdBy: 1001
          createdAt: "2026-06-28T12:00:00Z"
          archived: false
          deleted: false
          deletedAt: null
          ranking: "0|hzzzzz:"
          commentCount: 0
          fileCount: 0
          fields:
            - key: string-2
              type: STRING
              title: Notes
              value: ""
          subitems: []
          subscribedTeams: []
          subscribedUsers: []
      x-plaky115-mcp:
        name: plaky_create_item
        title: Create item
        description: Create a Plaky item using a title, group, parent, and optional field values.
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items/{itemId}"].get
    update:
      operationId: getItem
      summary: Retrieve an item
      description: Retrieve one Plaky item by ID.
      x-plaky115-usage-example:
        title: Get an item
        description: Fetch a specific item before reading details or planning a mutation.
        position: 7
      x-plaky115-mcp:
        name: plaky_get_item
        title: Get item
        description: Retrieve one Plaky item by ID.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items/{itemId}"].delete
    update:
      operationId: deleteItem
      summary: Delete an item
      description: Delete one Plaky item by ID.
      x-plaky115-usage-example:
        title: Delete an item
        description: Remove one known item after explicit user confirmation.
        position: 8
      x-plaky115-mcp:
        name: plaky_delete_item
        title: Delete item
        description: Delete one Plaky item by ID.
        scopes: [write, destructive]
        readOnlyHint: false
        destructiveHint: true
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items/{itemId}/sub-items"].get
    update:
