        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items/{itemId}/fields/{itemFieldKey}"].patch
    update:
      operationId: updateItemField
      summary: Update one item field
      description: Update a single field value on one Plaky item.
      x-plaky115-usage-example:
        title: Update one item field
        description: Change one field by field key after resolving the item.
        position: 10
        request:
          value: new value
        response:
          id: 123456
          title: Example item
          fields:
            - key: string-2
              type: STRING
              title: Notes
              value: new value
      x-plaky115-mcp:
        name: plaky_update_item_field
        title: Update item field
        description: Update a single field value on one Plaky item.
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items/{itemId}/fields"].patch
    update:
      operationId: updateItemFields
      summary: Update item fields
      description: Update multiple field values on one Plaky item.
      x-plaky115-usage-example:
        title: Update item fields
        description: Apply a compact field-value object keyed by field title or field key.
        position: 11
        request:
          string-2: new value
        response:
          id: 123456
          title: Example item
          fields:
            - key: string-2
              type: STRING
              title: Notes
              value: new value
      x-plaky115-mcp:
        name: plaky_update_item_fields
        title: Update item fields
        description: Update multiple field values on one Plaky item.
        scopes: [write]
        readOnlyHint: false
