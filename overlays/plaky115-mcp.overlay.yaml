openapi: 3.1.0
overlay: 1.0.0
info:
  title: Plaky115 MCP And DX Metadata
  version: 0.1.0
actions:
  - target: $.info
    update:
      title: Plaky115 Public API
      description: |
        Unofficial Plaky115 toolkit metadata for generated SDK, CLI, and MCP
        artifacts. This overlay does not change the upstream API contract; it
        adds generation hints for better pagination and MCP tool behavior.
  - target: $.paths.*["get","head"]
    update:
      x-speakeasy-mcp:
        scopes:
          - read
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths.*["post","put","patch"]
    update:
      x-speakeasy-mcp:
        scopes:
          - write
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true
  - target: $.paths.*["delete"]
    update:
      x-speakeasy-mcp:
        scopes:
          - write
        readOnlyHint: false
        destructiveHint: true
        idempotentHint: true
        openWorldHint: true

  - target: $.paths["/v1/public/spaces"].get
    update:
      summary: List spaces
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-speakeasy-mcp:
        title: List spaces
        description: List workspace spaces with optional embedded boards.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/teams"].get
    update:
      summary: List workspace teams
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-speakeasy-mcp:
        title: List workspace teams
        description: List Plaky teams visible to the API key.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/users"].get
    update:
      summary: List workspace users
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-speakeasy-mcp:
        title: List workspace users
        description: List Plaky users, optionally filtered by email, status, or role.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/spaces/{spaceId}/boards"].get
    update:
      summary: List boards in a space
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-speakeasy-mcp:
        title: List boards
        description: List boards in a Plaky space.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items"].get
    update:
      summary: List board items
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
          results: $.data
      x-speakeasy-mcp:
        title: List board items
        description: List items on a board, with optional filters and expansions.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items"].post
    update:
      summary: Create an item
      x-speakeasy-mcp:
        title: Create item
        description: Create a new Plaky item using a title, group, parent, and optional field values.
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true
  - target: $.paths["/v1/public/spaces/{spaceId}"].get
    update:
      summary: Get space by ID
      x-speakeasy-mcp:
        title: Get space
        description: Retrieve one Plaky space by ID.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/teams/{teamId}"].get
    update:
