  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}/items/{itemId}"].get
    update:
      summary: Get item by ID
      x-speakeasy-mcp:
        title: Get item
        description: Retrieve one Plaky item by ID.
