      x-speakeasy-mcp:
        title: Get team
        description: Retrieve one Plaky team by ID.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/users/me"].get
    update:
      summary: Get current user
      x-speakeasy-mcp:
        title: Get current user
        description: Retrieve the user associated with the provided API key.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
  - target: $.paths["/v1/public/spaces/{spaceId}/boards/{boardId}"].get
    update:
      summary: Get board by ID
      x-speakeasy-mcp:
        title: Get board
        description: Retrieve one Plaky board by space ID and board ID.
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
