openapi: 3.1.0
info:
  title: Plaky115 Public API
  description: |
    Unofficial Plaky115 toolkit metadata for generated SDK, CLI, and MCP
    artifacts. This overlay does not change the upstream API contract; it
    adds generation hints for better pagination and MCP tool behavior.
  termsOfService: https://plaky.com/terms
  contact:
    name: Plaky
    email: support@plaky.com
  version: v1
servers:
  - url: https://api.plaky.com
    description: Generated server url
security:
  - api-key-auth: []
tags:
  - name: Users
    description: |
      This is a set of endpoints to manage users. You can search users and
      retrieve user's details.
  - name: Teams
    description: |
      This is a set of endpoints to manage teams. You can search teams and
      retrieve team's details.
  - name: Spaces
    description: |
      This is a set of endpoints to manage space. You can search spaces and
      retrieve space's details.
  - name: Boards
    description: |
      This is a set of endpoints to manage boards. You can search boards and
      retrieve board's details.
  - name: Items
    description: >
      This is a set of endpoints to manage board items. Items could form individual,

      highly customizable tasks which could be managed. So, you can create items,

      edit/remove also or you can change your custom item field values.

  - name: Item comments
    description: |
      Set of endpoints for comment management. You can create specific comment
      or reply to the existing one, change/remove as well.
  - name: Item comment reactions
    description: |
      This is a set of endpoints to manage item comment reaction(s). As a user,
      you can set multiple reactions on some comment, override/remove them at
      the same time.
paths:
  /v1/public/spaces:
    get:
      tags:
        - Spaces
      summary: List spaces
      operationId: getSpaces
      parameters:
        - name: expand
          in: query
          description: Comma-separated list of relationships to be expanded into full objects.
          required: false
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - board
          example: board
        - name: page
          in: query
          description: Page number.
          required: false
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: Page size.
          required: false
          schema:
            type: integer
            format: int32
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
