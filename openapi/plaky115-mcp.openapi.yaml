components:
  schemas:
    ValidationErrorResponse:
      type: object
      properties:
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"
        errorCode:
          type: integer
          format: int32
        errorLabel:
          type: string
    Violation:
      type: object
      properties:
        fieldName:
          type: string
        message:
          type: string
    CommentRequest:
      type: object
      description: Represents item comment request.
      properties:
        text:
          type: string
          description: Represents text of the comment.
          example: My comment.
          minLength: 1
        repliesToId:
          type: integer
          format: int64
          description: Represents comment ID to reply to.
          example: 1
      required:
        - text
    CommentResponse:
      type: object
      description: Represents item comment response.
      properties:
        id:
          type: integer
          format: int64
          description: Represents unique item comment identifier across the system.
        content:
          type: string
          description: Represents content of the comment.
        deleted:
          type: boolean
          description: Indicates whether the comment is softly deleted.
        createdBy:
          type: integer
          format: int64
          description: Represents ID of the user who created the comment.
        createdAt:
          type: string
          format: date-time
          description: Represents date and time of the comment creation (UTC) in ISO-8601 format.
        updatedAt:
          type: string
          format: date-time
          description: Represents date and time of the comment update (UTC) in ISO-8601 format.
        pinned:
          type: boolean
          description: Indicates whether the comment is pinned.
        reactions:
          type: array
          description: Represents reactions to the comment.
          items:
            $ref: "#/components/schemas/ReactionResponse"
        replies:
          type: array
          description: Represents replies to the comment.
          items:
            $ref: "#/components/schemas/CommentResponse"
    ReactionDetails:
      type: object
      description: Represents user reaction details.
      properties:
        userId:
          type: integer
          format: int64
          description: Represents unique user identifier accross the system.
        reactedAt:
          type: string
          format: date-time
          description: Represents date and time of the comment reaction creation (UTC) in ISO-8601 format.
    ReactionResponse:
      type: object
      description: Represents detailed comment reaction response.
      properties:
        reactionCode:
          type: string
          description: >
            Represents the string code of the emoji. For example, for thumbs up emoji, we have "1f44d" code.

        reactedUsers:
          type: array
          description: Represents a list of users who left the comment reaction.
          items:
            $ref: "#/components/schemas/ReactionDetails"
    Reaction:
      type: object
      properties:
        value:
          type: string
          description: >
            A code representing an emoji, like "1f44d" (thumbs up) or "2705" (checkmark button).

            You'll see there are variations on how an emoji could be represented, we need a unicode representation

            without "U+" prefix. For example, the unicode for "thumbs up" is "U+1F44D", so take it after the plus

            sign (letter case doesn't matter).

          example: 1f44d
          minLength: 1
      required:
        - value
    ReactionPutRequest:
      type: object
      description: Represents request for adding/removing authenticated user's comment reaction(s).
      properties:
        reactions:
          type: array
          description: >
            You can leave multiple reactions, it's overriding the current ones that you've left,

            leave empty to remove them.

          items:
            $ref: "#/components/schemas/Reaction"
          uniqueItems: true
      required:
        - reactions
    ReactionPutResponse:
      type: object
      description: Represents response on reaction(s) change.
      properties:
        reactions:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/ReactionResponseNoCode"
          description: >
            A map containing reaction code as a key and the list of reactions without code

            (ReactionResponseNoCode) as a value.

    ReactionResponseNoCode:
      type: object
      description: Represents item comment reaction response without reaction code.
      properties:
        createdById:
          type: integer
          format: int64
          description: Represents ID of the user who created the comment reaction.
        createdAt:
          type: string
          format: date-time
          description: Represents date and time of the comment reaction creation (UTC) in ISO-8601 format.
    ItemCreateRequest:
      type: object
      description: Represents item create request.
      properties:
        title:
          type: string
          description: >-
            Represents title of the item. If it is not provided then default title be set. Default title for item is New Item and

            for subitem it is New Subitem.
          example: My New Item
          maxLength: 255
        parentId:
          type: integer
          format: int64
          description: >-
            Represents ID of the parent under which subitem is created. If it has null value then item is created, if

            it is specified then subitem is created under specified parent.
          example: 1
        groupId:
          type: integer
          format: int64
          description: >-
            Represents ID of the item group in which item is created. If it is not specified then **groupTitle** field

            will be used for determining in which group item is created.
          example: 1
        groupTitle:
          type: string
          description: >-
            Represents title of the item group in which item is created. If neither **groupId** nor **groupTitle** field is

            not specified then item will be created in the first group in the board.
          example: Backlog
        fields:
          type: object
          additionalProperties: {}
          description: >
            Represents item field values added to the item. If it is omitted then item will be created with default values. Field can be

            specified by it's key or by it's title. Field value differs per type and for some types it can be specified in multiple ways.


            | Type | Examples (Key / Title) |

            | :--- | :--- |

            | **String** | `{"string-1" : "test"}` <br> `{"String Field Title" : "test"}` |

            | **Rich Text** | `{"rich_text-1" : "some rich text"}` <br> `{"Description" : "some rich text"}` |

            | **Number** | `{"number-1" : 13.4}` <br> `{"Price" : 13.4}` |

            | **Date** | `{"date_time-1" : "2017-06-02T18:10:15.254Z"}` <br> `{"Date" : "2017-06-02T18:10:15.254Z"}` |

            | **Timeline** | `{"timeline-1" : {"start" : "2026-01-02T18:10:15.254Z", "end": "2026-02-02T18:10:15.254Z"}}` <br> `{"Timeline" : {"start" : "2026-01-02T18:10:15.254Z", "end": "2026-02-02T18:10:15.254Z"}}` |

            | **Status** | `{"status-1" : "1"}`, `{"status-1" : "To do"}` <br> `{"Status" : "1"}`, `{"Status" : "To do"}` |

            | **Tag** | `{"tag-1" : ["1", "2"]}`, `{"tag-1" : ["Product", "HR"]}` <br> `{"Department" : ["1", "2"]}`, `{"Department" : ["Product", "HR"]}` |

            | **Link** | `{"link-1" : "https://www.google.com"}` <br> `{"link-1" : {"url" : "https://www.google.com", "displayText" : "Google"}}` <br> `{"Link" : "https://www.google.com"}` |

            | **Person** | `{"person-1": {"users" : [{"id" : "1"}, {"email" : "test@gmail.com"}], "teams": [{"id" : 1}, {"title" : "Backend Team"}]}}` <br> `{"Assignee": {"users" : [{"id" : "1"}, {"email" : "test@gmail.com"}], "teams": [{"id" : 1}, {"title" : "Backend Team"}]}}` |

          example:
            Status: To do
            number-1: 50
            Description: Test description
    BoardDefaultValues:
      type: object
      properties:
        title:
          type: string
          description: Represents configured default item title in the board.
        groupId:
          type: integer
          format: int64
          description: Represents configured default item group in the board.
        subscribedUserIds:
          type: array
          description: Represents list of configured user ids which are by default added as subscribers to the new item in the board.
          items:
            type: integer
            format: int64
        subscribedTeamIds:
          type: array
          description: Represents list of configured team ids which are by default added as subscribers to the new item in the board.
          items:
            type: integer
            format: int64
        defaultAttributes:
          type: object
          additionalProperties: {}
          description: >-
            Represents configured default attribute values applied to new items created on this board.

            "The keys are unique attribute keys, and the values are the default data for that attribute.
          example:
            status-1: "1"
            tag-1:
              - "1"
              - "2"
    BoardResponse:
      type: object
      description: Represents board response.
      properties:
        id:
          type: integer
          format: int64
          description: Represents unique identifier of the board.
        title:
          type: string
          description: Represents title of the board.
        description:
          type: string
          description: Represents description of the board.
        defaultBoard:
          type: boolean
          description: Indicates if the board is default.
        template:
          type: boolean
          description: If true, it means the board serves as a template for generating other production-ready boards.
        ranking:
          type: string
          description: Represents lexicographical string used for the board ordering.
        kind:
          type: string
          description: Represents type of the board.
          enum:
            - PUBLIC
            - PRIVATE
        editPermissionsMode:
          type: string
          description: Represents permission modes for the board edit actions.
          enum:
            - EVERYTHING
            - CONTENT
            - UPDATES
        folder:
          description: Represents folder containing the board. Can be returned as an ID or a full object if expanded.
          oneOf:
            - $ref: "#/components/schemas/FolderResponse"
            - type: integer
              format: int64
        space:
          description: Represents space containing the board. Can be returned as an ID or a full object if expanded.
          oneOf:
            - $ref: "#/components/schemas/SpaceResponse"
            - type: integer
              format: int64
        defaultValues:
          $ref: "#/components/schemas/BoardDefaultValues"
          description: Represents configured default values used when creating new item.
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ItemAttributeDefinition"
            description: Represents list of item field definitions present in the board.
        groups:
          type: array
          items:
            $ref: "#/components/schemas/ItemGroupResponse"
            description: Represents list of item group definitions present in the board.
    DateTimeConfiguration:
      allOf:
        - $ref: "#/components/schemas/ItemAttributeConfiguration"
        - type: object
          properties:
            showCurrentYear:
              type: boolean
              description: Represents whether the year in the date format is displayed.
            showDayOfTheWeek:
              type: boolean
              description: Represents whether the name of the day is displayed.
            showWeekNumbers:
              type: boolean
              description: Represents whether week number is displayed.
            alwaysKeepAddTimeOn:
              type: boolean
              description: Represents whether the time component is displayed.
      description: Represents configuration for date-time attribute.
    FolderResponse:
      type: object
      description: Represents folder response.
      properties:
        id:
          type: integer
          format: int64
          description: Represents unique folder identifier across the system.
        title:
          type: string
          description: Represents title of the item group.
        ranking:
          type: string
          description: Represents lexicographical string used for ordering.
    ItemAttributeConfiguration: {}
    ItemAttributeDefinition:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Represents unique identifier of the item attribute.
        name:
          type: string
          description: Represents name of the item attribute.
        description:
          type: string
          description: Represents description of the item attribute.
        key:
          type: string
          description: Represents key of the item attribute.
        type:
          type: string
          description: Represents type of the item attribute.
          enum:
            - STRING
            - NUMBER
            - DATE_TIME
            - STATUS
            - TAG
            - PERSON
            - RICH_TEXT
            - LINK
            - TIMELINE
        configuration:
          description: Represents configuration of the item attribute.
          oneOf:
            - $ref: "#/components/schemas/DateTimeConfiguration"
            - $ref: "#/components/schemas/NoConfiguration"
            - $ref: "#/components/schemas/NumberConfiguration"
            - $ref: "#/components/schemas/PersonConfiguration"
            - $ref: "#/components/schemas/StatusConfiguration"
            - $ref: "#/components/schemas/TagConfiguration"
            - $ref: "#/components/schemas/TimelineConfiguration"
    ItemFieldResponse:
      type: object
      description: Represents item field response.
      properties:
        key:
          type: string
          description: Represents key of the item field.
          examples:
            - status-1
            - tag-1
            - person-1
        type:
          type: string
          description: Represents type of the item field.
          enum:
            - STRING
            - NUMBER
            - DATE_TIME
            - STATUS
            - TAG
            - PERSON
            - RICH_TEXT
            - TIMELINE
            - LINK
        title:
          type: string
          description: Represents title of the item field.
        value:
          description: >
            Represents the value of an item field. This field is **expandable**.

            By default, it returns a **Short** version (primitive/simple ID).

            If expanded, it returns a **Full** version (object with metadata).


            ### Value Mapping Table


            | Field Type | Short Version (Default) | Full Version (Expanded) |

            | :--- | :--- | :--- |

            | **Text** | `string` | `string` |

            | **Number** | `number` | `number` |

            | **Date** | `string` (ISO 8601) | `string` (ISO 8601) |

            | **Status** | `string` (key) | `object` (key, label, color) |

            | **Tag** | `array<string>` (keys) | `array<object>` (key, label, color) |

            | **Link** | `object` (url, displayText) | `object` (url, displayText) |

            | **Timeline** | `object` (start, end) | `object` (start, end) |

            | **Person** | `object` (assigned IDs) | `object` (full User/Team objects) |

    ItemGroupResponse:
      type: object
      description: Represents item group response.
      properties:
        id:
          type: integer
          format: int64
          description: Represents unique item group identifier across the system.
        title:
          type: string
          description: Represents title of the item group.
        color:
          type: string
          description: Represents color of the item group. Color value is in standard RGB hexadecimal format.
        ranking:
          type: string
          description: Represents lexicographical string used for custom ordering/sorting.
    ItemResponse:
      type: object
      description: Represents extendable item response.
      properties:
        id:
          type: integer
          format: int64
          description: Represents unique item identifier across the system.
        title:
          type: string
          description: Represents item title.
        ranking:
          type: string
          description: Represents item ranking.
        createdAt:
          type: string
          format: date-time
          description: Represents date and time of the item creation (UTC) in ISO-8601 format.
        deletedAt:
          type: string
          format: date-time
          description: Represents date and time of the item soft deletion (UTC) in ISO-8601 format.
        archived:
          type: boolean
          description: Indicates whether the item is archived.
        deleted:
          type: boolean
          description: Indicates whether the item is softly deleted.
        commentCount:
          type: integer
          format: int32
          description: Represents number of comments added on the item.
        fileCount:
          type: integer
          format: int32
          description: Represents number of files uploaded on the item.
        createdBy:
          description: Represents ID of the user who created the item, it can be expanded to retrieve full user details.
          oneOf:
            - $ref: "#/components/schemas/ShortUserResponse"
            - type: integer
              format: int64
        group:
          description: Represents ID of the group in which item is created, it can be expanded to include full group details.
          oneOf:
            - $ref: "#/components/schemas/ItemGroupResponse"
            - type: integer
              format: int64
        board:
          description: Represents ID of the board in which item is created, it can be expanded to include full board details.
          oneOf:
            - $ref: "#/components/schemas/BoardResponse"
            - type: integer
              format: int64
        space:
          description: Represents ID of the space in which item is created, it can be expanded to include full space details
          oneOf:
            - $ref: "#/components/schemas/SpaceResponse"
            - type: integer
              format: int64
        parent:
          description: Represents ID of the parent for subitem, it can be expanded to include full item details. It is non-null only for subitems.
          oneOf:
            - $ref: "#/components/schemas/ItemResponse"
            - type: integer
              format: int64
        fields:
          type: array
          description: >
            Represents list of the item fields present on the item. In default response values for status, tag and person

            fields are simple IDs. Response can be expanded to include full details for status, tag and person fields.

          items:
            $ref: "#/components/schemas/ItemFieldResponse"
        subscribedUsers:
          type: array
          items:
            description: Represents list of subscribed user ids to the item, it can be expanded to include full user details.
            oneOf:
              - $ref: "#/components/schemas/ShortUserResponse"
              - type: integer
                format: int64
        subscribedTeams:
          type: array
          items:
            description: Represents list of subscribed team ids to the item, it can be expanded to include full team details.
            oneOf:
              - $ref: "#/components/schemas/TeamShortResponse"
              - type: integer
                format: int64
        subitems:
          type: array
          items:
            $ref: "#/components/schemas/ItemResponse"
            description: Represents list of subitems.
    NoConfiguration:
