      x-order: 1
      x-speakeasy-mcp:
        scopes:
          - read
          - read
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
        title: List spaces
        description: List workspace spaces with optional embedded boards.
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: page
            in: parameters
            type: page
          - name: pageSize
            in: parameters
            type: limit
        outputs:
