            values:
              type: array
              description: Represents list of possible status labels.
              items:
                $ref: "#/components/schemas/StatusLabelDefinition"
            defaultValue:
              type: string
              description: Represents the key of the default status label.
      description: Represents configuration for status attribute.
    StatusLabelDefinition:
      type: object
      properties:
        key:
          type: string
          description: Represents the unique identifier/key for the status label.
        title:
          type: string
          description: Represents the display title of the status.
        color:
          type: string
          description: Represents the hexadecimal color code representing the status.
        isFinal:
          type: boolean
          description: Indicates if this status represents a 'completed' state in the workflow.
    TagConfiguration:
      allOf:
        - $ref: "#/components/schemas/ItemAttributeConfiguration"
        - type: object
          properties:
            values:
              type: array
              description: List of possible tag definitions available.
              items:
                $ref: "#/components/schemas/TagLabelDefinition"
      description: Configuration for tag attribute.
    TagLabelDefinition:
      type: object
      properties:
        key:
          type: string
          description: Represents the unique identifier/key for the status label.
        title:
          type: string
          description: Represents the display title of the status.
        color:
          type: string
          description: Represents the hexadecimal color code representing the status.
    TimelineConfiguration:
      allOf:
        - $ref: "#/components/schemas/ItemAttributeConfiguration"
        - type: object
          properties:
            showCurrentYear:
              type: boolean
              description: Represents whether the year is displayed.
            showTime:
              type: boolean
              description: Represents whether the time is displayed.
      description: Configuration for timeline range attribute.
    FieldValueChangeRequest:
      type: object
      description: Represents request for item field value change.
      properties:
        value:
          description: >
            Represents item field value. Field value differs per type and for some types it can be specified in multiple ways.


            | Type | Examples (Key / Title) |

            | :--- | :--- |

            | **String** | `{"value" : "test"}`|

            | **Rich Text** | `{"value" : "some rich text"}`

            | **Number** | `{"value" : 13.4}` |

            | **Date** | `{"value" : "2017-06-02T18:10:15.254Z"}` |

            | **Timeline** | `{"value" : {"start" : "2026-01-02T18:10:15.254Z", "end": "2026-02-02T18:10:15.254Z"}}` |

            | **Status** | `{"value" : "1"}`, `{"value" : "To do"}` |

            | **Tag** | `{"value" : ["1", "2"]}`, `{"value" : ["Product", "HR"]}` |

            | **Link** | `{"value" : "https://www.google.com"}`, `{"value" : {"url" : "https://www.google.com", "displayText" : "Google"}}`  |

            | **Person** | `{"value": {"users" : [{"id" : "1"}, {"email" : "test@gmail.com"}], "teams": [{"id" : 1}, {"title" : "Backend Team"}]}}`|

          example:
            value: To do
