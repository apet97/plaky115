            type: integer
            format: int64
        - name: parentId
          in: query
          description: Represents unique item identifier across the system.
          required: false
          schema:
            type: integer
            format: int64
        - name: subitemsBehaviour
          in: query
          description: >
            Indicates how subitems are treated in the response. By default subitems will be included.

            This flag is not applicable when **parentId** is set.


            **Options:**

            * **INCLUDE**: Includes subitems in the top level response.

            * **EXCLUDE**: Excludes subitems from the top level response.

            * **EMBED**: Excludes from top level and embeds into each parent with sorts and filters applied.

          required: false
          schema:
            type: string
            default: INCLUDE
            enum:
              - INCLUDE
              - EXCLUDE
              - EMBED
        - name: page
          in: query
          description: Page number.
          required: false
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: Page size.
          required: false
