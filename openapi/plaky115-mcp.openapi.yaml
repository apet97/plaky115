  /v1/public/spaces/{spaceId}/boards/{boardId}/items/{itemId}/fields:
    patch:
      tags:
        - Items
      summary: Update item fields
      operationId: changeItemAttributeValues
      parameters:
        - name: spaceId
          in: path
          description: Represents unique space identifier across the system.
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: boardId
          in: path
          description: Represents unique board identifier across the system.
          required: true
          schema:
            type: integer
            format: int64
          example: 1
        - name: itemId
          in: path
          description: Represents unique item identifier across the system.
          required: true
          schema:
            type: integer
            format: int64
          example: "1"
      requestBody:
        description: Represents item field values to be changed.
        content:
          application/json:
            schema:
              type: string
              description: >
                Represents item field values to be changed. Field can be specified by it's key or by it's title.

                For example if there is field with key **status-1** and title **Task Status** then in the request it can be referenced by either of them.

                Field value differs per type and for some types it can be specified in multiple ways.


                | Type | Examples (Key / Title) |

                | :--- | :--- |

                | **String** | `{"string-1" : "test"}` <br> `{"String Field Title" : "test"}` |

                | **Rich Text** | `{"rich_text-1" : "some rich text"}` <br> `{"Description" : "some rich text"}` |

                | **Number** | `{"number-1" : 13.4}` <br> `{"Price" : 13.4}` |

                | **Date** | `{"date_time-1" : "2017-06-02T18:10:15.254Z"}` <br> `{"Date" : "2017-06-02T18:10:15.254Z"}` |

                | **Timeline** | `{"timeline-1" : {"start" : "2026-01-02T18:10:15.254Z", "end": "2026-02-02T18:10:15.254Z"}}` <br> `{"Timeline" : {"start" : "2026-01-02T18:10:15.254Z", "end": "2026-02-02T18:10:15.254Z"}}` |

                | **Status** | `{"status-1" : "1"}`, `{"status-1" : "To do"}` <br> `{"Status" : "1"}`, `{"Status" : "To do"}` |

                | **Tag** | `{"tag-1" : ["1", "2"]}`, `{"tag-1" : ["Product", "HR"]}` <br> `{"Department" : ["1", "2"]}`, `{"Department" : ["Product", "HR"]}` |

                | **Link** | `{"link-1" : "https://www.google.com"}` <br> `{"link-1" : {"url" : "https://www.google.com", "displayText" : "Google"}}` <br> `{"Link" : "https://www.google.com"}` |

                | **Person** | `{"person-1": {"users" : [{"id" : "1"}, {"email" : "test@gmail.com"}], "teams": [{"id" : 1}, {"title" : "Backend Team"}]}}` <br> `{"Assignee": {"users" : [{"id" : "1"}, {"email" : "test@gmail.com"}], "teams": [{"id" : 1}, {"title" : "Backend Team"}]}}` |

              example:
                Status: To do
                number-1: 50
                Description: Updated description
              title: MultipleFieldValueChangeRequest
        required: true
