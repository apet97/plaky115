name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.12.0", "24", "26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Install Speakeasy
        run: curl -fsSL https://raw.githubusercontent.com/speakeasy-api/speakeasy/main/install.sh | sh
      - name: Add Speakeasy to PATH
        run: echo "$HOME/.speakeasy/bin" >> "$GITHUB_PATH"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.17"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
      - name: Install package deps
        run: |
          npm --prefix sdk ci
          npm --prefix mcp-server ci
      - name: Verify
        run: npm run verify
